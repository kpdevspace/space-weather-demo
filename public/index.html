<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Weather Early Warning Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root{--bg:#091225;--bg2:#112a4e;--glass:rgba(255,255,255,.08);--line:rgba(255,255,255,.16);--text:#eaf2ff;--muted:#a6b9dd;--green:#35d49a;--yellow:#f8c14b;--red:#ff657d}
    *{box-sizing:border-box} body{margin:0;font-family:'Kanit',sans-serif;color:var(--text);background:radial-gradient(900px 500px at 80% -10%,#225fb2 0,transparent 55%),linear-gradient(150deg,var(--bg),var(--bg2));min-height:100vh}
    .wrap{max-width:1180px;margin:24px auto;padding:0 14px 32px}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.title{font-size:clamp(1.2rem,2.8vw,1.9rem);font-weight:700}
    .sub{color:var(--muted);font-size:.95rem}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--glass)}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-link{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);text-decoration:none;font-size:.9rem}
    .nav-link:hover{background:rgba(255,255,255,.12)}
    .grid{display:grid;gap:12px}.kpi{grid-template-columns:repeat(4,minmax(0,1fr));margin:12px 0}.main{grid-template-columns:minmax(360px,1fr) minmax(520px,1.6fr);align-items:stretch}
    .card{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(10px);border-radius:16px;padding:14px;box-shadow:0 8px 28px rgba(0,0,0,.2)}
    .left-panel{display:grid;gap:12px;grid-template-rows:minmax(290px,1fr) minmax(250px,1fr);height:100%}
    .card.map-card{height:100%;display:flex;flex-direction:column}
    .card.map-card #riskMap{flex:1}
    .label{color:var(--muted);font-size:.9rem}.value{font-size:clamp(1.2rem,2.5vw,1.9rem);font-weight:700;margin-top:6px}.hint{font-size:.86rem;color:#8fb0e8;margin-top:4px}
    .low{color:var(--green)}.medium{color:var(--yellow)}.high{color:var(--red)}
    .timeline{display:grid;gap:8px}.event{border-left:3px solid var(--line);padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.04)}.event.low{border-left-color:var(--green)}.event.medium{border-left-color:var(--yellow)}.event.high{border-left-color:var(--red)}
    .map{height:100%;min-height:560px;border-radius:12px;border:1px solid rgba(255,255,255,.18);overflow:hidden;background:#0b1630}
.leaflet-container{background:#0b1630}
.map-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;font-size:.82rem;color:var(--muted)}
.map-legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
.dot.low{background:var(--green)}.dot.medium{background:var(--yellow)}.dot.high{background:var(--red)}
    table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left;font-size:.9rem}th{color:var(--muted);font-weight:500}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:10px;padding:8px 11px;cursor:pointer;font-family:inherit}
    button.primary{background:linear-gradient(135deg,#2d62c0,#4e8ef2);border:0}
    @media(max-width:1180px){.main{grid-template-columns:1fr}.left-panel{grid-template-rows:auto}.map{min-height:500px}}
    @media(max-width:980px){.kpi{grid-template-columns:repeat(2,minmax(0,1fr))}.map{min-height:440px}}
    @media(max-width:520px){.kpi{grid-template-columns:1fr}.map{min-height:360px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="title">Space Weather Early Warning Dashboard (Demo)</div>
        <div class="sub" id="meta">กำลังโหลดข้อมูลจริง...</div>
      </div>
      <div class="top-actions">
        <a class="nav-link" href="/help.html" title="คู่มือคำอธิบายตัวแปรและศัพท์เฉพาะ">📘 Help</a>
        <div class="pill" id="overall">สถานะรวม: ...</div>
      </div>
    </div>

    <section class="grid kpi">
      <div class="card"><div class="label">Kp Index</div><div class="value" id="kp">-</div><div class="hint" id="kpHint">-</div></div>
      <div class="card"><div class="label">Solar Wind (km/s)</div><div class="value" id="sw">-</div><div class="hint" id="swHint">-</div></div>
      <div class="card"><div class="label">X-ray Flux Class</div><div class="value" id="xr">-</div><div class="hint" id="xrHint">-</div></div>
      <div class="card"><div class="label">Risk Level</div><div class="value" id="risk">-</div><div class="hint" id="riskHint">-</div></div>
    </section>

    <section class="grid main">
      <div class="left-panel">
        <div class="card">
          <div style="font-weight:600;margin-bottom:8px">ไทม์ไลน์แจ้งเตือน</div>
          <div id="timeline" class="timeline"></div>
          <div class="actions">
            <button class="primary" onclick="refreshData()">รีเฟรชข้อมูลทันที</button>
            <button onclick="alert('ส่งแจ้งเตือน (เดโม)')">ส่งแจ้งเตือน</button>
            <button onclick="window.print()">พิมพ์รายงาน</button>
          </div>
        </div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:8px">เหตุการณ์ล่าสุด</div>
          <table>
            <thead><tr><th>เวลา</th><th>เหตุการณ์</th><th>เสี่ยง</th><th>ผลกระทบ</th></tr></thead>
            <tbody id="incidentBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card map-card">
        <div style="font-weight:600;margin-bottom:8px">ชั้นข้อมูลครบ 77 จังหวัด (GeoJSON จริง)</div>
        <div id="riskMap" class="map"></div>
        <div class="map-legend">
          <span><i class="dot low"></i> ต่ำ</span>
          <span><i class="dot medium"></i> กลาง</span>
          <span><i class="dot high"></i> สูง</span>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./app.js"></script>
</body>
</html>
